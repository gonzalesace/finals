<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Information Form</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        table {
            border-collapse: separate;
            border-spacing: 0;
            background-color: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }

        th {
            background-color: #2c3e50;
            color: #ffffff;
            padding: 20px;
            text-align: center;
            font-size: 18px;
            letter-spacing: 0.5px;
        }

        td {
            padding: 15px 25px;
            border-bottom: 1px solid #edf2f7;
            font-size: 15px;
            color: #4a5568;
        }

        td:first-child {
            background-color: #f8fafc;
            font-weight: 600;
            width: 35%;
        }

        input[type="text"], 
        select, 
        textarea {
            width: 100%;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            padding: 10px;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
        }

        input[type="text"]:focus, 
        select:focus, 
        textarea:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }

        .radio-group, .checkbox-group {
            line-height: 1.8;
        }

        tr td.describe-td {
            background-color: #ffffff;
        }

        tr td.btn-td {
            text-align: center;
            background-color: #f8fafc;
            padding: 25px;
        }

        input[type="submit"] {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            transition: background 0.2s;
        }

        input[type="submit"]:hover {
            background-color: #2980b9;
        }

        input[type="radio"], input[type="checkbox"] {
            margin-right: 10px;
            transform: scale(1.1);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <form action="thankyou.html" method="post">
        <table>
            <thead>
                <tr>
                    <th colspan="2">Registration Form</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><label for="name">Name</label></td>
                    <td><input type="text" id="name" name="name" required></td>
                </tr>
                <tr>
                    <td>Sex</td>
                    <td class="radio-group">
                        <input type="radio" id="male" name="sex" value="male">
                        <label for="male">Male</label><br>
                        <input type="radio" id="female" name="sex" value="female">
                        <label for="female">Female</label>
                    </td>
                </tr>
                <tr>
                    <td><label for="eyecolor">Eye color</label></td>
                    <td>
                        <select name="eyecolor" id="eyecolor">
                            <option value="brown">Brown</option>
                            <option value="blue">Blue</option>
                            <option value="green" selected>Green</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td>Attributes</td>
                    <td class="checkbox-group">
                        <input type="checkbox" id="tall" name="tall" value="tall">
                        <label for="tall">Over 6 feet tall</label><br>
                        <input type="checkbox" id="heavy" name="heavy" value="heavy">
                        <label for="heavy">Over 200 pounds</label>
                    </td>
                </tr>
                <tr>
                    <td colspan="2" class="describe-td">
                        <label for="athletic"><strong>Athletic Description:</strong></label>
                        <textarea id="athletic" name="athletic" rows="4" style="margin-top: 10px;"></textarea>
                    </td>
                </tr>
                <tr>
                    <td colspan="2" class="btn-td">
                        <input type="submit" value="Submit Information">
                    </td>
                </tr>
            </tbody>
        </table>
    </form>

</body>
</html>
